# Active Impact dev stack: Postgres + the app.
#   docker compose up -d --build      # then open http://localhost:8000
# Postgres is published on 127.0.0.1:5433 for pytest / psql. Caddy/TLS is prod-only.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: impact
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d impact"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  app:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/impact
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
