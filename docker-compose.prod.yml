# Active Impact production stack: Caddy (HTTPS) -> app -> Postgres.
#
#   cp .env.example .env      # then edit SITE_ADDRESS, POSTGRES_PASSWORD
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy terminates TLS for SITE_ADDRESS and proxies to the app. The app and DB
# are NOT published to the host -- only reachable through Caddy.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/impact
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    # no published ports -- only reachable via caddy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: impact
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d impact"]
      interval: 3s
      timeout: 3s
      retries: 20
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

volumes:
  pgdata:
  caddy_data:
  caddy_config:
